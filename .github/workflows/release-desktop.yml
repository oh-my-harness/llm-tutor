name: Release desktop artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis
            artifact_name: windows-x64
          - label: macOS x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            bundles: dmg
            artifact_name: macos-x64
          - label: macOS arm64
            os: macos-15
            target: aarch64-apple-darwin
            bundles: dmg
            artifact_name: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure private Git dependencies
        shell: bash
        env:
          PRIVATE_DEPS_TOKEN: ${{ secrets.PRIVATE_DEPS_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${PRIVATE_DEPS_TOKEN:-}" ]]; then
            echo "::error title=Missing PRIVATE_DEPS_TOKEN::Create a repository secret named PRIVATE_DEPS_TOKEN with read access to private git dependencies such as oh-my-harness/llm-api-adapter."
            exit 1
          fi
          echo "::add-mask::${PRIVATE_DEPS_TOKEN}"
          git config --global url."https://x-access-token:${PRIVATE_DEPS_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix web-ui

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: desktop-${{ runner.os }}-${{ matrix.target }}
          key: release-${{ matrix.target }}
          cache-on-failure: true

      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install nsis protoc -y --no-progress

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: brew install protobuf

      - name: Build tutor-web sidecar
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          exe=""
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            exe=".exe"
          fi
          cargo build --release -p tutor-web --target "${TARGET}"
          mkdir -p src-tauri/binaries
          cp "target/${TARGET}/release/tutor-web${exe}" "src-tauri/binaries/tutor-web-${TARGET}${exe}"

      - name: Build Tauri bundle
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          BUNDLES: ${{ matrix.bundles }}
        run: |
          set -euo pipefail
          npx --yes @tauri-apps/cli@2.11.4 build --target "${TARGET}" --config src-tauri/tauri.release.conf.json --ci --bundles "${BUNDLES}"

      - name: Prepare release assets
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          PLATFORM: ${{ matrix.artifact_name }}
        run: |
          set -euo pipefail
          version="v$(node -p "require('./src-tauri/tauri.conf.json').version")"
          output_dir="release-assets"
          mkdir -p "${output_dir}"

          if [[ "${PLATFORM}" == "windows-x64" ]]; then
            msi=(target/${TARGET}/release/bundle/msi/*.msi)
            exe=(target/${TARGET}/release/bundle/nsis/*setup.exe)
            cp "${msi[0]}" "${output_dir}/Tutor-Agent-${version}-windows-x64.msi"
            cp "${exe[0]}" "${output_dir}/Tutor-Agent-${version}-windows-x64-setup.exe"
          else
            dmg=(target/${TARGET}/release/bundle/dmg/*.dmg)
            cp "${dmg[0]}" "${output_dir}/Tutor-Agent-${version}-${PLATFORM}.dmg"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: tutor-agent-${{ matrix.artifact_name }}
          path: release-assets/*
          if-no-files-found: error

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
