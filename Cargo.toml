[workspace]
members = [
    "crates/tutor-rag",
    "crates/tutor-tools",
    "crates/tutor-agent",
    "crates/tutor-web",
    "src-tauri",
]
resolver = "2"

[workspace.package]
edition = "2024"
version = "0.1.1"
license = "MIT"

[workspace.dependencies]
# Core/runtime crates (same rev from llm-harness-runtime)
llm-harness-agent = { git = "https://github.com/oh-my-harness/llm-harness-runtime.git", rev = "c727e36d835bd4dc0263b472c79ca037585ee084", package = "llm-harness-agent" }
llm-harness-types = { git = "https://github.com/oh-my-harness/llm-harness-runtime.git", rev = "c727e36d835bd4dc0263b472c79ca037585ee084", package = "llm-harness-types" }
llm-harness-loop  = { git = "https://github.com/oh-my-harness/llm-harness-runtime.git", rev = "c727e36d835bd4dc0263b472c79ca037585ee084", package = "llm-harness-loop" }
llm-harness-runtime = { git = "https://github.com/oh-my-harness/llm-harness-runtime.git", rev = "c727e36d835bd4dc0263b472c79ca037585ee084", package = "llm-harness-runtime" }
llm-harness-runtime-auth = { git = "https://github.com/oh-my-harness/llm-harness-runtime.git", rev = "c727e36d835bd4dc0263b472c79ca037585ee084", package = "llm-harness-runtime-auth" }
llm-harness-runtime-sandbox-os = { git = "https://github.com/oh-my-harness/llm-harness-runtime.git", rev = "c727e36d835bd4dc0263b472c79ca037585ee084", package = "llm-harness-runtime-sandbox-os" }
llm-harness-runtime-audit-jsonl = { git = "https://github.com/oh-my-harness/llm-harness-runtime.git", rev = "c727e36d835bd4dc0263b472c79ca037585ee084", package = "llm-harness-runtime-audit-jsonl" }

# LLM provider adapter
llm_adapter = { git = "https://github.com/oh-my-harness/llm-api-adapter", rev = "6699fca0c2c0d1ea699b88145d591be8461cc28e" }
llm_adapter_embedding = { package = "llm_adapter", git = "https://github.com/oh-my-harness/llm-api-adapter.git", rev = "de6015de627eb847b08331241b1ec402b5e6720b" }

# Common
anyhow      = "1"
async-trait = "0.1"
futures     = "0.3"
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
thiserror   = "2"
tokio       = { version = "1", features = ["full"] }
tokio-util  = { version = "0.7", features = ["rt"] }
arrow-array = "58.3.0"
arrow-schema = "58.3.0"
lancedb = "0.30.0"
